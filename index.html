<!DOCTYPE html>
<html>

<head>
    <title>Controle de Gastos</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "controle-de-gastos-3b673.firebaseapp.com",
            projectId: "controle-de-gastos-3b673",
            
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function salvarTransacao(transacao) {
            await addDoc(collection(db, "transacoes"), transacao);
            carregarTransacoes();
        }

        async function carregarTransacoes() {
            const querySnapshot = await getDocs(collection(db, "transacoes"));

            let lista = [];
            const tabela = document.getElementById("tabela-gastos");

            while (tabela.rows.length > 1) {
                tabela.deleteRow(1);
            }

            querySnapshot.forEach((doc) => {
                const item = doc.data();
                lista.push(item);

                const linha = document.createElement("tr");
                linha.innerHTML = `<td>${item.descricao}</td><td>R$ ${parseFloat(item.valor).toFixed(2)}</td>`;
                tabela.appendChild(linha);
            });

            atualizarGrafico(lista);
        }

        function atualizarGrafico(lista) {
    let categorias = {};

    lista.forEach(item => {
        if (!categorias[item.descricao]) {
            categorias[item.descricao] = 0;
        }
        categorias[item.descricao] += item.valor;
    });

    const labels = Object.keys(categorias);
    const data = Object.values(categorias);

    if (data.length === 0) return;

    // =====================
    // GRÁFICO DE PIZZA
    // =====================
    const ctx = document.getElementById('grafico').getContext('2d');

    const existente = Chart.getChart("grafico");
    if (existente) existente.destroy();

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: data,
                backgroundColor: [
                    '#ff6384',
                    '#36a2eb',
                    '#ffce56',
                    '#4bc0c0',
                    '#9966ff',
                    '#ff9f40'
                ]
            }]
        }
    });

    // =====================
    // GRÁFICO DE BARRAS
    // =====================
    const ctxBarra = document.getElementById('graficoBarras').getContext('2d');

    const existenteBarra = Chart.getChart("graficoBarras");
    if (existenteBarra) existenteBarra.destroy();

    let maior = Math.max(...data);
    let cores = data.map(valor => valor === maior ? '#ff0000' : '#36a2eb');

    new Chart(ctxBarra, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Gastos por categoria',
                data: data,
                backgroundColor: cores
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

    // =====================
    // TEXTO
    // =====================
    let index = data.indexOf(maior);
    document.getElementById("maiorGastoTexto").innerText =
        "Maior gasto: " + labels[index] + " (R$ " + maior.toFixed(2) + ")";
}


        window.salvarTransacao = salvarTransacao;
        window.carregarTransacoes = carregarTransacoes;

        window.onload = function() {
            carregarTransacoes();
        };

    </script>

</head>

<body>
    <h1 class="titulo">Controle Financeiro</h1>

    <div class="container">
        <h1>Meus Gastos</h1>

        <form onsubmit="return false;">
            <input type="number" id="valor" placeholder="Valor" step="0.01" required>

            <select id="descricao" required>
                <option value="">Selecione uma descrição</option>
                <option value="Alimentacao">Alimentação</option>
                <option value="Transporte">Transporte</option>
                <option value="Academia">Academia</option>
                <option value="Lazer">Lazer</option>
                <option value="Cartao">Cartao</option>
            </select>

            <button type="button" id="btnSalvar">+</button>
        </form>
    </div>


    <div class="fundo">
    <div class="table">
        <div class="tabela-lado">
        <h1>Gráfico de Gastos</h1>
        <table id="tabela-gastos">
            <tr>
                <td><strong>Descrição</strong></td>
                <td><strong>Valor R$</strong></td>
            </tr>
        </table>
        </div>

    </div>
    <div class="grafico-box">
        <canvas id="grafico"></canvas>
    </div>
    </div>
    


    <script>
        document.getElementById("btnSalvar").addEventListener("click", async function () {
            const valor = document.getElementById("valor").value;
            const descricao = document.getElementById("descricao").value;

            if (!valor || !descricao) {
                alert("Preencha tudo!");
                return;
            }

            const transacao = {
                valor: parseFloat(valor),
                descricao: descricao
            };

            if (typeof window.salvarTransacao === "function") {
                await window.salvarTransacao(transacao);
            } else {
                alert("Aguarde o Firebase carregar!");
            }
        });
    </script>

<h1>O que eu mais gasto</h1>

<div class="grafico-novo">
   <h2>Grafico de barras para mostrar o que eu mais gasto</h2>
   <canvas id="graficoBarras"></canvas>
   <h3 id="maiorGastoTexto"></h3>

</div>





</body>

</html>
